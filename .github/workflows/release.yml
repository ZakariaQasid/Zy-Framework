name: ZyUI GitHub Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch|minor|major)"
        required: true
        default: "patch"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/zyui/package-lock.json

      - name: Install
        working-directory: packages/zyui
        run: npm ci

      - name: Bump Version
        working-directory: packages/zyui
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Read Version
        id: version
        working-directory: packages/zyui
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit Version Bump
        run: |
          git add packages/zyui/package.json packages/zyui/package-lock.json
          git commit -m "chore(zyui): bump version to ${{ steps.version.outputs.version }}"

      - name: Create Tag
        run: git tag zyui-v${{ steps.version.outputs.version }}

      - name: Push Commit and Tag
        run: git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: zyui-v${{ steps.version.outputs.version }}
          name: ZyUI v${{ steps.version.outputs.version }}
          generate_release_notes: true
