name: ZyUI Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch|minor|major)"
        required: true
        default: "patch"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: packages/zyui/package-lock.json

      - name: Install
        working-directory: packages/zyui
        run: npm ci

      - name: Bump Version
        working-directory: packages/zyui
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Publish
        working-directory: packages/zyui
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
